name: 自動打包免安裝壓縮檔

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 下載原始碼
      uses: actions/checkout@v4

    - name: 設定現代化 .NET SDK 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: 自動還原套件並打包所有元件庫
      run: |
        $csproj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        if ($csproj) {
            Write-Host "找到專案檔：$($csproj.FullName)"
            dotnet build $csproj.FullName -c Release
        } else {
            Write-Error "找不到專案檔 (.csproj)！"
            exit 1
        }
      shell: pwsh

    - name: 壓縮發布資料夾 (確保 SQLite 核心檔案不遺失)
      run: |
        $exe = Get-ChildItem -Filter FormCrawlerApp.exe -Recurse | Where-Object { $_.DirectoryName -match "bin\\Release" } | Select-Object -First 1
        if ($exe) {
            $releaseDir = $exe.DirectoryName
            Write-Host "成功找到發布資料夾：$releaseDir"
            # 將整個 Release 目錄打包成 ZIP，這樣 x86 和 x64 的 SQLite 檔案就會跟著保留
            Compress-Archive -Path "$releaseDir\*" -DestinationPath .\FormCrawlerApp_Release.zip
        } else {
            Write-Error "找不到編譯後的 .exe 檔案！"
            exit 1
        }
      shell: pwsh

    - name: 將 ZIP 壓縮檔上傳供下載
      uses: actions/upload-artifact@v4
      with:
        name: FormCrawlerApp-Portable-ZIP
        path: .\FormCrawlerApp_Release.zip
