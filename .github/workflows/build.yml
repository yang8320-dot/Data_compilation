name: 自動打包免安裝單一執行檔

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 下載原始碼
      uses: actions/checkout@v4

    - name: 設定現代化 .NET SDK 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 支援編譯 .NET 4.7.2

    - name: 自動還原套件並打包所有元件庫
      run: |
        # 尋找專案檔
        $csproj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        if ($csproj) {
            Write-Host "找到專案檔：$($csproj.FullName)"
            # dotnet build 會自動處理 NuGet 還原，並觸發 Costura.Fody 內嵌 DLL
            dotnet build $csproj.FullName -c Release
        } else {
            Write-Error "找不到專案檔 (.csproj)！"
            exit 1
        }
      shell: pwsh

    - name: 尋找並提取免安裝 .exe 檔案
      run: |
        $exe = Get-ChildItem -Filter *.exe -Recurse | Where-Object { $_.DirectoryName -match "bin\\Release" -and $_.Name -notmatch "vshost" } | Select-Object -First 1
        if ($exe) {
            Write-Host "成功找到執行檔：$($exe.FullName)"
            Copy-Item $exe.FullName -Destination .\FormCrawlerApp.exe
        } else {
            Write-Error "找不到編譯後的 .exe 檔案！"
            exit 1
        }
      shell: pwsh

    - name: 將免安裝執行檔上傳供下載
      uses: actions/upload-artifact@v4
      with:
        name: FormCrawlerApp-Portable-EXE
        path: .\FormCrawlerApp.exe
