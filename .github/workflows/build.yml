name: Build and Upload Single EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.2

    # 自動尋找 .sln 檔案並還原 NuGet 套件
    - name: Restore NuGet Packages
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        if ($sln) {
            Write-Host "找到方案檔：$($sln.FullName)"
            nuget restore $sln.FullName
        } else {
            Write-Error "找不到方案檔 (.sln)！請確認是否已將 .sln 與 .csproj 推送至 GitHub。"
            exit 1
        }
      shell: pwsh

    # 自動尋找 .sln 檔案並進行 Release 編譯
    - name: Build Project
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        msbuild $sln.FullName /p:Configuration=Release /p:Platform="Any CPU"
      shell: pwsh

    # 自動尋找編譯產出的 .exe 並複製到根目錄
    - name: Find EXE
      run: |
        $exe = Get-ChildItem -Filter *.exe -Recurse | Where-Object { $_.DirectoryName -match "bin\\Release" -and $_.Name -notmatch "vshost" } | Select-Object -First 1
        if ($exe) {
            Write-Host "找到執行檔：$($exe.FullName)"
            Copy-Item $exe.FullName -Destination .\FormCrawlerApp.exe
        } else {
            Write-Error "找不到編譯後的 .exe 檔案！"
            exit 1
        }
      shell: pwsh

    # 將 .exe 檔案上傳到當前 Action 頁面的 Artifacts 區塊
    - name: Upload EXE to Action Page
      uses: actions/upload-artifact@v4
      with:
        name: FormCrawlerApp-Portable-EXE
        path: .\FormCrawlerApp.exe
