name: Build and Release Single EXE

on:
  workflow_dispatch:

# ==========================================
# 新增此區塊：賦予 Action 建立 Release 的寫入權限
permissions:
  contents: write
# ==========================================

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.2

    - name: Restore NuGet Packages
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        if ($sln) {
            Write-Host "找到方案檔：$($sln.FullName)"
            nuget restore $sln.FullName
        } else {
            Write-Error "找不到方案檔 (.sln)！請確認是否已將 .sln 與 .csproj 推送至 GitHub。"
            exit 1
        }
      shell: pwsh

    - name: Build Project
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        msbuild $sln.FullName /p:Configuration=Release /p:Platform="Any CPU"
      shell: pwsh

    - name: Find EXE and Prepare Release
      run: |
        $exe = Get-ChildItem -Filter *.exe -Recurse | Where-Object { $_.DirectoryName -match "bin\\Release" -and $_.Name -notmatch "vshost" } | Select-Object -First 1
        if ($exe) {
            Write-Host "找到執行檔：$($exe.FullName)"
            Copy-Item $exe.FullName -Destination .\ReleaseApp.exe
        } else {
            Write-Error "找不到編譯後的 .exe 檔案！"
            exit 1
        }
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ReleaseApp.exe
        tag_name: manual-build-${{ github.run_number }}
        name: Manual Build Release #${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
