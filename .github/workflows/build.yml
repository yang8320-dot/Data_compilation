name: 自動打包單一執行檔 (Build EXE)

# 限定手動點擊執行
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 下載原始碼
      uses: actions/checkout@v4

    - name: 設定 MSBuild 環境
      uses: microsoft/setup-msbuild@v2

    - name: 設定 NuGet 環境
      uses: NuGet/setup-nuget@v2

    - name: 自動還原缺少的套件 (包含 HtmlAgilityPack)
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        if ($sln) {
            Write-Host "找到方案檔：$($sln.FullName)"
            nuget restore $sln.FullName
        } else {
            Write-Error "找不到方案檔 (.sln)！請確認檔案已上傳。"
            exit 1
        }
      shell: pwsh

    - name: 執行 Release 編譯
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        msbuild $sln.FullName /p:Configuration=Release /p:Platform="Any CPU"
      shell: pwsh

    - name: 尋找打包好的 .exe 執行檔
      run: |
        $exe = Get-ChildItem -Filter *.exe -Recurse | Where-Object { $_.DirectoryName -match "bin\\Release" -and $_.Name -notmatch "vshost" } | Select-Object -First 1
        if ($exe) {
            Write-Host "成功找到執行檔：$($exe.FullName)"
            Copy-Item $exe.FullName -Destination .\FormCrawlerApp.exe
        } else {
            Write-Error "找不到編譯後的 .exe 檔案！"
            exit 1
        }
      shell: pwsh

    - name: 將 .exe 上傳至 Actions 頁面供下載
      uses: actions/upload-artifact@v4
      with:
        name: FormCrawlerApp-Portable-EXE
        path: .\FormCrawlerApp.exe
